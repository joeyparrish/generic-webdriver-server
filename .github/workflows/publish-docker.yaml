# A workflow to publish docker images.
name: Publish Docker Images

# Runs when called from another workflow.
# Can also be run manually for debugging purposes.
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      latest:
        required: true
        type: boolean
  # For manual debugging:
  workflow_dispatch:
    inputs:
      tag:
        description: The tag to build from and to push to.
        required: true
        type: string
      latest:
        description: If true, push to the "latest" tag.
        required: true
        type: boolean

jobs:
  publish:
    # GHCR = GitHub Container Registry, an alternative to DockerHub or Google
    # Container Registry.
    name: Publish to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Without this option, an image built by one step is not available
          # locally for the next step.
          driver: docker

      - name: Login to GHCR (only on push event)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute GHCR org name
        # github.repository_owner may be mixed case.  While GitHub Actions is
        # case-insensitive when comparing strings, GHCR requires a lowercase
        # name.
        run: |
          ORG="${{github.repository_owner}}"
          # The bash expansion below lowercases the variable, which we then
          # write to the GitHub Actions environment for subsequent steps to
          # use.
          echo "GHCR_ORG=${ORG,,}" >> "$GITHUB_ENV"

      - name: Build Tizen Studio base image
        uses: docker/build-push-action@v5
        with:
          context: backends/tizen/tizen-studio-docker/base/
          tags: ghcr.io/${{ env.GHCR_ORG }}/tizen-studio:${{ inputs.tag }}
          push: false
          load: true

      - name: Build and push Tizen Studio TV image
        uses: docker/build-push-action@v5
        with:
          context: backends/tizen/tizen-studio-docker/tv-3.0/
          tags: ghcr.io/${{ env.GHCR_ORG }}/tizen-studio-tv-3.0:${{ inputs.tag }}
          build-args:
            - BASE_IMAGE=ghcr.io/${{ env.GHCR_ORG }}/tizen-studio
            - BASE_VERSION=${{ inputs.tag }}
          push: true
          load: true

      - name: Build and push Tizen Studio TV image as "latest"
        if: ${{ inputs.latest }}
        uses: docker/build-push-action@v5
        with:
          context: backends/tizen/tizen-studio-docker/tv-3.0/
          tags: ghcr.io/${{ env.GHCR_ORG }}/tizen-studio-tv-3.0:latest
          build-args:
            - BASE_IMAGE=ghcr.io/${{ env.GHCR_ORG }}/tizen-studio
            - BASE_VERSION=${{ inputs.tag }}
          push: true
          load: true
